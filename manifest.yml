manifest_version: 2

version:
  name: v1
  label: "Snowflake Health Data Forge v1.6"
  comment: "Transforms HL7v2, FHIR R4 (JSON & XML) into OMOP CDM v5.4 or Tuva Input Layer. 39 stored procedures (23 OMOP + 13 Tuva + 3 orchestration). Uses Tuva Health (Apache 2.0) vocabulary seeds. Multi-cloud (AWS, Azure, GCP)."

artifacts:
  setup_script: scripts/setup.sql
  readme: README.md
  default_streamlit: core.tuva_fhir_to_omop_ui

configuration:
  log_level: INFO
  trace_level: OFF

privileges:
  - CREATE DATABASE:
      description: "Creates the OMOP CDM output database in the consumer account"
  - CREATE WAREHOUSE:
      description: "Optional: creates a dedicated warehouse for transformation workloads"
  - EXECUTE TASK:
      description: "Schedules incremental FHIR-to-OMOP refresh tasks"
  - EXECUTE MANAGED TASK:
      description: "Runs serverless tasks for scheduled transformations"

references:
  - fhir_source_database:
      label: "FHIR Source Database"
      description: "Database containing clinical data (HL7v2 messages, FHIR R4 JSON bundles, or FHIR R4 XML bundles) to transform into OMOP CDM or Tuva Input Layer"
      privileges:
        - SELECT
      object_type: TABLE
      register_callback: core.register_reference
  - consumer_warehouse:
      label: "Warehouse"
      description: "Warehouse for running FHIR parsing and OMOP transformation queries"
      privileges:
        - USAGE
      object_type: WAREHOUSE
      register_callback: core.register_reference
